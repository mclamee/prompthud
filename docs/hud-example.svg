<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 84" role="img" aria-label="promptHUD statusline example">
  <style>
    .bg    { fill: #0d1117; }
    .code  { font-family: 'JetBrains Mono', Menlo, Consolas, 'Courier New', monospace; font-size: 14px; }
    .dim   { fill: #6e7681; }
    .cyan  { fill: #67e8f9; }
    .mag   { fill: #c084fc; font-weight: 700; }
    .green { fill: #86efac; font-weight: 700; }
    .red   { fill: #f87171; font-weight: 700; }
    .pink  { fill: #f472b6; }
    .slate { fill: #cbd5e1; }
    .yellow{ fill: #facc15; }
    .bar-f { fill: #86efac; }
    .bar-e { fill: #2a2a3a; }
  </style>
  <rect class="bg" width="900" height="84" rx="8"/>

  <!-- Row 1: model · project · ctx bar -->
  <text class="code" x="16" y="28">
    <tspan class="cyan">[Opus 4.7]</tspan>
    <tspan class="dim"> │ </tspan>
    <tspan class="yellow">dora</tspan>
    <tspan class="mag"> git:(</tspan><tspan class="cyan">main*</tspan><tspan class="mag">)</tspan>
    <tspan class="dim"> │ ctx </tspan>
  </text>
  <!-- context bar (4 filled + 6 dim blocks, 41%) -->
  <g transform="translate(238, 17)">
    <rect class="bar-f" x="0"  y="0" width="10" height="14"/>
    <rect class="bar-f" x="11" y="0" width="10" height="14"/>
    <rect class="bar-f" x="22" y="0" width="10" height="14"/>
    <rect class="bar-f" x="33" y="0" width="10" height="14"/>
    <rect class="bar-e" x="44" y="0" width="10" height="14"/>
    <rect class="bar-e" x="55" y="0" width="10" height="14"/>
    <rect class="bar-e" x="66" y="0" width="10" height="14"/>
    <rect class="bar-e" x="77" y="0" width="10" height="14"/>
    <rect class="bar-e" x="88" y="0" width="10" height="14"/>
    <rect class="bar-e" x="99" y="0" width="10" height="14"/>
  </g>
  <text class="code green" x="354" y="28">41%</text>

  <!-- Row 2: HUD prompts row -->
  <text class="code" x="16" y="60">
    <tspan class="mag">☰ 10</tspan><tspan class="dim"> (+3 more)</tspan>
    <tspan class="dim"> | </tspan>
    <tspan class="dim">7.</tspan><tspan class="cyan">debug token rotation…</tspan><tspan class="pink"> ×3</tspan>
    <tspan class="dim"> | </tspan>
    <tspan class="dim">8.</tspan><tspan class="cyan">add remember-me checkbox</tspan>
    <tspan class="dim"> | </tspan>
    <tspan class="dim">9.</tspan><tspan class="cyan">/test</tspan>
    <tspan class="dim"> | </tspan>
    <tspan class="green">▶ 10./commit</tspan><tspan class="dim"> ⋯</tspan>
  </text>
</svg>
